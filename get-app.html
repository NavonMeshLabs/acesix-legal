<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get AceSix</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body {
    height:100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #0F1628 0%, #1B2747 100%);
    color:#ffffff;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
  }
  .wrap { padding: 32px; max-width: 420px; }
  h1 { font-size: 26px; margin-bottom: 8px; }
  p { color: rgba(255,255,255,0.75); margin-bottom: 28px; font-size: 15px; line-height:1.5; }
  .spinner {
    width: 34px; height: 34px; margin: 0 auto 24px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #F2B84B;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .buttons { display:flex; flex-direction:column; gap:12px; }
  a.btn {
    display:block;
    padding: 14px 20px;
    border-radius: 12px;
    text-decoration:none;
    font-weight:600;
    font-size:15px;
  }
  a.btn.apple { background:#ffffff; color:#0F1628; }
  a.btn.google { background:#34A853; color:#ffffff; }
  .fallback { display:none; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="spinner" id="spinner"></div>
    <h1>Opening AceSix&hellip;</h1>
    <p id="status">Taking you to the right store for your device.</p>

    <div class="buttons fallback" id="fallback">
      <a class="btn apple" href="https://apps.apple.com/us/app/acesix/id6763536297">Download on the App Store</a>
      <a class="btn google" href="https://play.google.com/store/apps/details?id=com.acesix.app">Get it on Google Play</a>
    </div>
  </div>

  <script>
    var APP_STORE_URL = "https://apps.apple.com/us/app/acesix/id6763536297";
    var PLAY_STORE_URL = "https://play.google.com/store/apps/details?id=com.acesix.app";

    var ua = navigator.userAgent || navigator.vendor || window.opera;
    var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    var isAndroid = /android/i.test(ua);

    function showFallback(message) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').textContent = message;
      document.getElementById('fallback').style.display = 'flex';
    }

    if (isIOS) {
      document.getElementById('status').textContent = "Redirecting to the App Store…";
      window.location.href = APP_STORE_URL;
      setTimeout(function () { showFallback("Didn't redirect automatically? Tap below."); }, 2500);
    } else if (isAndroid) {
      document.getElementById('status').textContent = "Redirecting to Google Play…";
      window.location.href = PLAY_STORE_URL;
      setTimeout(function () { showFallback("Didn't redirect automatically? Tap below."); }, 2500);
    } else {
      showFallback("Choose your platform to download AceSix:");
    }
  </script>
</body>
</html>
